[build]
  command = "npm install --include=dev && npx nest build"
  publish = "dist"
  functions = "dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"

# Redirect all API requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/main"
  status = 200

[functions]
  [functions.node_bundle]
  external_node_modules = []

# Environment variables for production (set these in Netlify UI):
# DATABASE_HOST
# DATABASE_PORT
# DATABASE_USERNAME
# DATABASE_PASSWORD
# DATABASE_NAME
