[build]
  command = "npm install --include=dev && npx nest build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"

# Redirect all API requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/main"
  status = 200

# Frontend API calls (without /api/ prefix)
[[redirects]]
  from = "/roles"
  to = "/.netlify/functions/main"
  status = 200

[[redirects]]
  from = "/roles/*"
  to = "/.netlify/functions/main"
  status = 200

[[redirects]]
  from = "/users"
  to = "/.netlify/functions/main"
  status = 200

[[redirects]]
  from = "/users/*"
  to = "/.netlify/functions/main"
  status = 200

[[redirects]]
  from = "/farmer-profiles"
  to = "/.netlify/functions/main"
  status = 200

[[redirects]]
  from = "/farmer-profiles/*"
  to = "/.netlify/functions/main"
  status = 200

[[redirects]]
  from = "/distributor-profiles"
  to = "/.netlify/functions/main"
  status = 200

[[redirects]]
  from = "/distributor-profiles/*"
  to = "/.netlify/functions/main"
  status = 200

# Environment variables for production (set these in Netlify UI):
# DATABASE_HOST
# DATABASE_PORT
# DATABASE_USERNAME
# DATABASE_PASSWORD
# DATABASE_NAME
